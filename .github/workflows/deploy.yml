name: DeployReady CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install application dependencies
      - name: Install dependencies
        working-directory: ./dev-ops/DeployReady/app
        run: npm install

      # Run application tests
      - name: Run tests
        working-directory: ./dev-ops/DeployReady/app
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Build Docker image
      - name: Build Docker image
        run: docker build -t kora-api:${{ github.sha }} ./dev-ops/DeployReady