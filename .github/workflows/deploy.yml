name: DeployReady CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install application dependencies
      - name: Install dependencies
        working-directory: ./dev-ops/DeployReady/app
        run: npm install

      # Run application tests
      - name: Run tests
        working-directory: ./dev-ops/DeployReady/app
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Build Docker image
      - name: Build Docker image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          docker build -t "ghcr.io/$owner/kora-api:${GITHUB_SHA}" ./dev-ops/DeployReady

      # Push Docker image to GHCR
      - name: Push Docker image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          docker push "ghcr.io/$owner/kora-api:${GITHUB_SHA}"