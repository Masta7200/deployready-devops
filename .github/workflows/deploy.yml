name: DeployReady CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        working-directory: ./app
        run: npm install

      # Run tests
      - name: Run tests
        working-directory: ./app
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Build Docker image only (no push yet)
      - name: Build Docker image
        run: docker build -t kora-api:${{ github.sha }} .